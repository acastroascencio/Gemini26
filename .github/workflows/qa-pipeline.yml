name: Suite de Pruebas Automatizadas QA

on:
  push:
    branches: [ "master", "main" ]

jobs:
  ejecutar-pruebas:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar Java 17 en la nube
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. Ejecutar pruebas de TestNG con Maven
        run: mvn clean test

      - name: 4. Crear carpeta pública para el reporte
        if: always()
        run: |
          mkdir -p public_html
          cp **/*.html public_html/ || echo "HTML no encontrado"

      - name: 5. Publicar Dashboard en GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html